<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Famous Voices Ticker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  body {
    /* simple left-to-right linear gradient:
       brownish-rust on the left 30%, fading to dark on the right 70% */
    background: linear-gradient(to right, #3D1A0A 0%, #2D1A15 30%, #161410 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .label {
    font-family: 'Georgia', serif;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(201,146,58,0.75);
    margin-bottom: 18px;
  }

  .ticker-outer {
    width: 100%;
    overflow: hidden;
    position: relative;
    padding: 14px 0;
    border-top: 1px solid rgba(253,250,245,0.06);
    border-bottom: 1px solid rgba(253,250,245,0.06);
  }

  .ticker-outer::before,
  .ticker-outer::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    z-index: 3;
    pointer-events: none;
  }
  .ticker-outer::before {
    left: 0;
    background: linear-gradient(to right, #3D1A0A, transparent);
  }
  .ticker-outer::after {
    right: 0;
    background: linear-gradient(to left, #0F0906, transparent);
  }

  .ticker-track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 32s linear infinite;
    will-change: transform;
  }

  .ticker-track:hover { animation-play-state: paused; }

  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .ticker-track span {
    display: inline-block;
    font-family: 'Georgia', serif;
    font-size: 16px;
    font-weight: 400;
    margin: 0 32px;
    color: rgba(253,250,245,0.38);
    letter-spacing: 0.3px;
    transition: color 0.3s;
  }

  .ticker-track span:hover { color: rgba(253,250,245,0.8); }

  .ticker-track span em {
    font-style: normal;
    font-weight: 700;
    color: #C04A28;
  }

  .ticker-track span .role {
    font-size: 12px;
    color: rgba(253,250,245,0.22);
  }

  .ticker-track .sep {
    color: rgba(201,146,58,0.4);
    margin: 0 4px;
  }

  .tagline {
    font-family: 'Georgia', serif;
    font-size: 12px;
    font-style: italic;
    color: rgba(253,250,245,0.28);
    margin-top: 18px;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 0 20px;
  }

  .tagline em {
    color: rgba(201,146,58,0.7);
    font-style: normal;
  }
</style>
</head>
<body>

  <p class="label">People who stutter — and spoke anyway</p>

  <div class="ticker-outer">
    <div class="ticker-track" id="track"></div>
  </div>

  <p class="tagline">
    The world was shaped by voices that had to <em>fight</em> for every word.
  </p>

<script>
  const names = [
    { name: "Joe Biden",         role: "46th US President"   },
    { name: "Ed Sheeran",        role: "Musician"            },
    { name: "King George VI",    role: "Monarch"             },
    { name: "Marilyn Monroe",    role: "Icon"                },
    { name: "Tiger Foods",       role: "Champion"            },
    { name: "Emily Blunt",       role: "Actress"             },
    { name: "Samuel L. Jackson", role: "Actor"               },
    { name: "Winston Churchill", role: "Statesman"           },
    { name: "Kendrick Lamar",    role: "Artist"              },
    { name: "Charles Darwin",    role: "Scientist"           },
    { name: "Carly Simon",       role: "Singer"              },
    { name: "James Earl Jones",  role: "Actor"               },
    { name: "Nicole Kidman",     role: "Actress"             },
    { name: "Bruce Willis",      role: "Actor"               },
    { name: "Idris",             role: "Data Viz Specialist" },
  ];

  const all = [...names, ...names];
  const track = document.getElementById('track');
  track.innerHTML = all.map(p =>
    `<span><em>${p.name}</em><span class="role"> · ${p.role}</span><span class="sep"> ··</span></span>`
  ).join('');
</script>

</body>
</html>
