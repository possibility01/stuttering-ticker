<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="X-UA-Compatible" content="allowtransparency=true"/>
<title>Famous Voices Ticker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background: transparent !important;
  }

  body {
    width: 100%; height: 100%;
    background: transparent !important;
    overflow: hidden;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* grain removed — causes white layer conflict with transparent bg */

  /* ── top label ── */
  .label {
    font-family: 'Georgia', serif;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(201,146,58,0.6);
    margin-bottom: 20px;
    position: relative; z-index: 2;
  }

  /* ── ticker wrapper ── */
  .ticker-outer {
    width: 100%;
    overflow: hidden;
    position: relative; z-index: 2;
    border-top: 1px solid rgba(253,250,245,0.07);
    border-bottom: 1px solid rgba(253,250,245,0.07);
    padding: 14px 0;
  }

  /* fade edges */
  .ticker-outer::before,
  .ticker-outer::after {
    content: '';
    position: absolute; top: 0; bottom: 0; width: 80px;
    z-index: 3; pointer-events: none;
  }
  .ticker-outer::before {
    left: 0;
    background: linear-gradient(to right, transparent, transparent);
  }
  .ticker-outer::after {
    right: 0;
    background: linear-gradient(to left, transparent, transparent);
  }

  .ticker-track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 32s linear infinite;
    will-change: transform;
  }

  .ticker-track:hover { animation-play-state: paused; }

  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .ticker-track span {
    display: inline-block;
    font-family: 'Georgia', serif;
    font-size: 17px;
    font-weight: 400;
    margin: 0 36px;
    color: rgba(253,250,245,0.32);
    letter-spacing: 0.3px;
    transition: color 0.3s;
  }

  .ticker-track span:hover { color: rgba(253,250,245,0.7); }

  .ticker-track span em {
    font-style: normal;
    font-weight: 700;
    color: #C04A28;
  }

  .ticker-track span .role {
    font-size: 13px;
    color: rgba(253,250,245,0.22);
    margin-left: 2px;
  }

  /* ── dot separator ── */
  .ticker-track .sep {
    color: rgba(201,146,58,0.35);
    margin: 0 4px;
    font-size: 14px;
  }

  /* ── bottom tagline ── */
  .tagline {
    font-family: 'Georgia', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(253,250,245,0.28);
    margin-top: 22px;
    letter-spacing: 0.5px;
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 24px;
  }

  .tagline em {
    color: rgba(201,146,58,0.6);
    font-style: normal;
  }
</style>
</head>
<body>

  <p class="label">People who stutter — and spoke anyway</p>

  <div class="ticker-outer">
    <div class="ticker-track" id="track"></div>
  </div>

  <p class="tagline">
    The world was shaped by voices that had to <em>fight</em> for every word.
  </p>

<script>
  const names = [
    { name: "Joe Biden",         role: "46th US President"   },
    { name: "Ed Sheeran",        role: "Musician"            },
    { name: "King George VI",    role: "Monarch"             },
    { name: "Marilyn Monroe",    role: "Icon"                },
    { name: "Tiger Woods",       role: "Champion"            },
    { name: "Emily Blunt",       role: "Actress"             },
    { name: "Samuel L. Jackson", role: "Actor"               },
    { name: "Winston Churchill", role: "Statesman"           },
    { name: "Kendrick Lamar",    role: "Artist"              },
    { name: "Charles Darwin",    role: "Scientist"           },
    { name: "Carly Simon",       role: "Singer"              },
    { name: "James Earl Jones",  role: "Actor"               },
    { name: "Nicole Kidman",     role: "Actress"             },
    { name: "Bruce Willis",      role: "Actor"               },
    { name: "Idris",             role: "Data Viz Specialist" },
  ];

  // duplicate for seamless infinite loop
  const all = [...names, ...names];

  const track = document.getElementById('track');
  track.innerHTML = all.map(p =>
    `<span><em>${p.name}</em><span class="role"> · ${p.role}</span><span class="sep"> ·· </span></span>`
  ).join('');
</script>

</body>
</html>
